apiVersion: v1
kind: ReplicationController
metadata: 
  name: my-rc
  labels:
    app: myapp
spec:
  replicas: 5
  selector: 
    app: myapp
  template:
    metadata:
      name: rc-temp
      labels:
        app: myapp
    spec:
      containers:
      - name: nginx-cont
        image: mayurpandit25/studentapp-frontend:latest
        ports:
        - containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata: 
  name: replica-svc
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
  - port: 80
    targetPort: 80 
