apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
  labels:
    app: myapp
spec:
  replicas: 5
  selector:
    matchLabels:
      app: myapp
  strategy: 
    type: RollingUpdate
    rollingupdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      name: temp
      labels:
        app: myapp
    spec:
      containers:
      - name: con
        image: nginx:latest
        ports:
        - contanerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: npsvc
  labels: 
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
  ports:
  - port: 80
    targetPort: 80
