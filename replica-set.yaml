apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rp-set
  labels:
    app: myapp
spec:
  replicas: 2
  selector: 
    matchLabels: 
      app: myapp
  template:
    metadata: 
      name: temp
      labels:
        app: myapp
    spec:
      containers:
      - nama: con
        image:  mayurpandit25/studentapp-frontend:latest
        ports:
          containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: replica-svc
  labels: 
    app:myapp
spec:
  type: NodePort
  selector:
    app:myapp
  ports:
  - port: 80
    targetPort: 80

