apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
  labels:
    app: myapp
spec:
  replicas: 5
  selector:
    matchLabels:
      app: myapp
  strategy: 
    type: Recreate
  template:
    metadata:
      name: temp
      labels:
        app: myapp
    spec:
      containers:
      - name: con
        image: nginx:latest
        ports:
        - containerPort: 80
