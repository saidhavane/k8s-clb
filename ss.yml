apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: state
  labels:
    app: myapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: temp
      labels:
        app: myapp
    spec:
      containers:
      - name: mysql
        image: nginx
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_USER
          value: admin
        - name: MYSQL_PASSWORD
          value: admin123
        - name: MYSQL_DATABASE
          value: studentapp
        - name: MYSQL_ROOT_PASSWORD
          value: root  