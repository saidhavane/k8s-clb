apiVersion: apps/v1
kind: Deployment
metadata: 
  name: my-deploy
  labels: 
    app: myapp
    namespace: hpa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template: 
    metadata:
      name: temp
      labels:
        app: myapp
    spec:
      containers:
      - name: pod
        image: nginx
        ports:
        - containerPort: 80